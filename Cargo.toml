[package]
name = "cpp2rust-demo"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
description = "C++ to Rust Safe FFI scaffolding generator"
license = "MIT"

[[bin]]
name = "cpp2rust-demo"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
clang = "2"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
dialoguer = "0.11"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
