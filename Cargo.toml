[package]
name = "cpp2rust-ffi"
version = "0.1.0"
edition = "2021"
description = "C++ to Rust Safe FFI 自动化工具"
keywords = ["ffi", "cpp", "rust", "binding"]

[[bin]]
name = "cpp2rust-ffi"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1.11"

[dev-dependencies]
tempfile = "3"
