[package]
name = "cpp2rust-demo"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
description = "C++ to Rust FFI generation via clang AST JSON + hicc"
license = "MIT"

[[bin]]
name = "cpp2rust-demo"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
walkdir = "2"
dialoguer = "0.11"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
serde_json = "1.0"
