[package]
name = "cpp2rust-demo"
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
description = "C++ to Rust safe FFI workflow: build capture + hicc scaffolding"
license = "MIT"

[[bin]]
name = "cpp2rust-demo"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
walkdir = "2"
dialoguer = "0.11"
toml_edit = "0.22"
indexmap = { version = "2", features = ["serde"] }
clang-ast = "0.1.35"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"
