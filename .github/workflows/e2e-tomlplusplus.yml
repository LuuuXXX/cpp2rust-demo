name: E2E toml++

# 实际项目独立 CI：marzer/tomlplusplus（header-only 大型单头 + 重度模板）
on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "tests/tomlplusplus_e2e_test.rs"
      - ".github/workflows/e2e-tomlplusplus.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  tomlplusplus:
    name: toml++ init+merge+check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodule
        run: git submodule update --init references/tomlplusplus

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-tomlplusplus-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run toml++ E2E
        run: cargo test --test tomlplusplus_e2e_test -- --test-threads=1
