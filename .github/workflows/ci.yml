      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang + llvm-nm)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Add LLVM bin to PATH (provides llvm-nm)
        run: echo "${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-mingw-cargo-l5-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-mingw-cargo-l5-
            ${{ runner.os }}-mingw-cargo-

      # 并行预构建所有示例 Rust crate（PowerShell），共享 CARGO_TARGET_DIR
      - name: Pre-build all Rust example projects
        run: |
          $targetDir = "$env:GITHUB_WORKSPACE\examples-target"
          $libclangPath = "$env:LLVM_PATH\bin"
          $manifests = Get-ChildItem -Path examples -Recurse -Filter Cargo.toml |
            Where-Object { $_.DirectoryName -like '*rust_hicc' } |
            Select-Object -ExpandProperty FullName
          $jobs = $manifests | ForEach-Object {
            $manifestPath = $_
            Start-Job -ScriptBlock {
              param($manifest, $tdir, $llvm)
              $env:CARGO_TARGET_DIR = $tdir
              $env:LIBCLANG_PATH = $llvm
              $result = cargo build --manifest-path $manifest 2>&1
              if ($LASTEXITCODE -ne 0) {
                throw "cargo build failed for $manifest`n$result"
              }
            } -ArgumentList $manifestPath, $targetDir, $libclangPath
          }
          $jobs | Wait-Job | Receive-Job
          $failed = $jobs | Where-Object { $_.State -eq 'Failed' }
          if ($failed.Count -gt 0) {
            $failed | ForEach-Object { Receive-Job $_ -ErrorAction SilentlyContinue }
            throw "Pre-build failed for $($failed.Count) example project(s)"
          }
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}\examples-target
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run L5 nm symbol tests
        run: |
          cargo test --test l5_nm_symbol_tests -- --ignored --nocapture --test-threads=4
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}\examples-target
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ════════════════════════════════════════════════════════════════
  # macOS 系列（macos-latest，Apple Silicon / x86_64）
  # 依赖：Homebrew LLVM（提供 libclang + clang++）
  # 编译拦截：DYLD_INSERT_LIBRARIES + libhook.dylib（make -f hook/Makefile）
  # ════════════════════════════════════════════════════════════════

  # ── Build (macOS) ─────────────────────────────────────────────────
  build-macos:
    name: Build (cpp2rust-demo, macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

  # ── Unit tests (macOS) ────────────────────────────────────────────
  unit-tests-macos:
    name: Unit tests (macOS)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
