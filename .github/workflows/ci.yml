      - name: Run unit tests (bin) – multi-feature merge & output-dir
        run: cargo test --bin cpp2rust-demo

  # ── L1 Golden tests (macOS) ───────────────────────────────────────
  l1-golden-macos:
    name: L1 Golden tests (macOS)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
