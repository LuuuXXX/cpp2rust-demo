name: CI

on:
  push:
    branches: ["main", "master"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "CHANGELOG.md"
  pull_request:
    branches: ["main", "master"]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "CHANGELOG.md"
  workflow_dispatch:

# 同一分支有新 commit 时自动取消旧的 CI 运行，节省 runner 配额
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ── 公共说明 ────────────────────────────────────────────────────────────────
# matrix.run_on_pr:
#   true  → 任何事件均运行（Linux）
#   false → 仅 push/workflow_dispatch/ci:full 标签时运行（Windows & macOS）
#
# 版本说明：
#   actions/checkout@v4      (Node.js 20，与 runner 兼容)
#   actions/cache@v4         (Node.js 20，与 runner 兼容)
#   KyleMayes/install-llvm-action@v2  (最新 v2.0.9，无 v3 版本)
# 注意：checkout@v6/cache@v5 使用 node24，当前 runner 不支持，勿升级
# ──────────────────────────────────────────────────────────────────────────

jobs:
  # ── L0: 编译工具本身 ───────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      - name: Build
        run: cargo build --all-targets

  # ── 单元测试 ───────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests (${{ matrix.name }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib

      - name: Run unit tests (bin) – multi-feature merge & output-dir
        run: cargo test --bin cpp2rust-demo

  # ── L1: Golden 测试（代码生成准确性）─────────────────────────────────────
  l1-golden:
    name: L1 Golden tests (${{ matrix.name }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: >-
          cargo test --test l1_golden_tests --
          --include-ignored
          --test-threads=1

  # ── L2: 编译测试（所有示例 rust_hicc/ 可 cargo build）──────────────────────
  l2-compile:
    name: L2 Compile tests (${{ matrix.name }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests

  # ── L3: 运行测试（cargo run 输出与 README 一致）────────────────────────────
  l3-run:
    name: L3 Run tests (${{ matrix.name }})
    needs: [l1-golden, l2-compile]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      # Linux：构建 .so 共享库
      - name: Build C++ shared libraries (Linux)
        if: matrix.variant == 'linux'
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ lib for $example..."
            (cd "$dir" && g++ -shared -fPIC *.cpp -o "lib${example##*_}.so") || echo "⚠ Failed to build C++ lib for $example (skipping)"
          done

      # MinGW：构建 .dll（在 MSYS2 shell 中执行）
      - name: Build C++ DLLs (MinGW)
        if: matrix.variant == 'mingw'
        shell: msys2 {0}
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ DLL for $example..."
            (cd "$dir" && g++ -shared *.cpp -o "${example##*_}.dll") || echo "⚠ Failed to build C++ DLL for $example (skipping)"
          done

      # MSVC：C++ 代码由 build.rs（cc crate）静态编译，无需额外 DLL 构建步骤

      # macOS：构建 .dylib（使用系统 Apple Clang，避免头文件兼容问题）
      - name: Build C++ dylibs (macOS)
        if: matrix.variant == 'macos'
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ dylib for $example..."
            (cd "$dir" && /usr/bin/clang++ -dynamiclib *.cpp -o "lib${example##*_}.dylib") || echo "⚠ Failed to build C++ dylib for $example (skipping)"
          done

      - name: Run L3 run tests
        run: >-
          cargo test --test l3_run_tests --
          --include-ignored
          --test-threads=1

  # ── L4: rapidjson 端到端门禁（init + merge 全流程）────────────────────────
  l4-rapidjson-e2e:
    name: L4 rapidjson E2E (${{ matrix.name }})
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev libgtest-dev

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install cmake (macOS)
        if: matrix.variant == 'macos'
        run: brew install cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      # 单线程运行：clang 全局状态 + rapidjson 文件数量多
      - name: Run L4 rapidjson E2E tests
        run: >-
          cargo test --test rapidjson_e2e_test --
          --test-threads=1

  # ── Usage: verify-rapidjson-ffi.sh（本地验证脚本门禁）────────────────────
  usage-verify-rapidjson-ffi:
    name: Usage verify-rapidjson-ffi (${{ matrix.name }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev \
            cmake binutils git

      # Windows（MinGW 和 MSVC）均需要 MSYS2 来运行 bash 脚本
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-cmake
            git

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install cmake (macOS)
        if: matrix.variant == 'macos'
        run: brew install cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      - name: Build cpp2rust-demo binary
        run: cargo build --release

      - name: Run verify-rapidjson-ffi.sh (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          export PATH="${GITHUB_WORKSPACE}/target/release:${PATH}"
          SKIP_INSTALL=1 bash usage/verify-rapidjson-ffi.sh

      - name: Run verify-rapidjson-ffi.sh (Windows, MSYS2 shell)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath -u "${CARGO_HOME:-$HOME/.cargo}")/bin:$(cygpath -u "${GITHUB_WORKSPACE}")/target/release:${PATH}"
          SKIP_INSTALL=1 bash usage/verify-rapidjson-ffi.sh

      - name: Verify generated project passes cargo check (Linux)
        if: matrix.variant == 'linux'
        run: |
          cd "${GITHUB_WORKSPACE}/.cpp2rust/rapidjson_shim/rust"
          cargo check --quiet

  # ── L5: nm 符号链接验证（C++ extern-C ⊆ Rust binary）─────────────────────
  l5-nm-symbols:
    name: L5 nm symbol validation (${{ matrix.name }})
    needs: l2-compile
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev binutils

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux; provides llvm-nm on Windows)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH and add llvm-nm to PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      # --nocapture：确保符号比对报告（C++ exports / Rust linked / missing）
      # 在 CI 日志中可见，无论测试成功与否均可追溯。
      - name: Run L5 nm symbol tests
        run: >-
          cargo test --test l5_nm_symbol_tests --
          --ignored
          --nocapture
          --test-threads=4

  # ── L4: 五个新项目 E2E 端到端验证（tinyxml2/pugixml/sqlite3/nlohmann/fmtlib）
  l4-e2e-libraries:
    name: L4 E2E Libraries (${{ matrix.name }})
    needs: build
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: linux, os: ubuntu-latest,  name: Linux,          run_on_pr: true,  rust_target: "",                       cache_infix: ""      }
          - { variant: mingw, os: windows-latest, name: "Windows MinGW", run_on_pr: false, rust_target: "x86_64-pc-windows-gnu",  cache_infix: "mingw-" }
          - { variant: msvc,  os: windows-latest, name: "Windows MSVC",  run_on_pr: false, rust_target: "x86_64-pc-windows-msvc", cache_infix: "msvc-"  }
          - { variant: macos, os: macos-latest,   name: macOS,           run_on_pr: false, rust_target: "",                       cache_infix: ""      }
    runs-on: ${{ matrix.os }}
    if: >-
      matrix.run_on_pr ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false  # 手动初始化需要的子模块

      - name: Init E2E submodules
        run: |
          git submodule update --init \
            references/tinyxml2 \
            references/pugixml \
            references/nlohmann-json \
            references/fmtlib

      - name: Install system dependencies (Linux)
        if: matrix.variant == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev libsqlite3-dev

      - name: Setup MSYS2 (MinGW)
        if: matrix.variant == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        if: matrix.variant == 'mingw'
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (non-Linux)
        if: matrix.variant != 'linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH (macOS)
        if: matrix.variant == 'macos'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install sqlite3 (macOS)
        if: matrix.variant == 'macos'
        run: brew install sqlite3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.cache_infix }}cargo-

      - name: Run tinyxml2 E2E
        run: cargo test --test tinyxml2_e2e_test -- --test-threads=1

      - name: Run pugixml E2E
        run: cargo test --test pugixml_e2e_test -- --test-threads=1

      # Windows 无 /usr/include/sqlite3.h，测试内部会自动跳过（graceful skip）
      # macOS 系统头路径与 Linux 不同，测试内部会自动跳过（graceful skip）
      - name: Run sqlite3 E2E
        run: cargo test --test sqlite3_e2e_test -- --test-threads=1

      - name: Run nlohmann/json E2E
        run: cargo test --test nlohmann_json_e2e_test -- --test-threads=1

      - name: Run fmtlib E2E
        run: cargo test --test fmtlib_e2e_test -- --test-threads=1

  # ── L4: 多 feature 合并 & output-dir 真实项目验证 ─────────────────────────
