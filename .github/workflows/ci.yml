  # ── L3 Run tests (MSVC) ──────────────────────────────────────────
  # MSVC 下 C++ 代码由 build.rs（cc crate）静态编译，无需额外 DLL 构建步骤。
  l3-run-msvc:
    name: L3 Run tests (Windows MSVC)
    runs-on: windows-latest
    needs: [l2-compile-msvc]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-msvc-cargo-l3-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-msvc-cargo-l3-
            ${{ runner.os }}-msvc-cargo-

      # 预构建所有示例项目（PowerShell），共享 CARGO_TARGET_DIR
      - name: Pre-build all Rust example projects
        run: |
          $targetDir = "$env:GITHUB_WORKSPACE\examples-target"
          $manifests = Get-ChildItem -Path examples -Recurse -Filter Cargo.toml |
            Where-Object { $_.DirectoryName -like '*rust_hicc' } |
            Select-Object -ExpandProperty FullName
          $jobs = $manifests | ForEach-Object {
            $manifestPath = $_
            Start-Job -ScriptBlock {
              param($manifest, $tdir)
              $env:CARGO_TARGET_DIR = $tdir
              $result = cargo build --manifest-path $manifest 2>&1
              if ($LASTEXITCODE -ne 0) {
                throw "cargo build failed for $manifest`n$result"
              }
            } -ArgumentList $manifestPath, $targetDir
          }
          $jobs | Wait-Job | Receive-Job
          $failed = $jobs | Where-Object { $_.State -eq 'Failed' }
          if ($failed.Count -gt 0) {
            $failed | ForEach-Object { Receive-Job $_ -ErrorAction SilentlyContinue }
            throw "Pre-build failed for $($failed.Count) example project(s)"
          }
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}\examples-target
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run L3 run tests
        run: |
          cargo test --test l3_run_tests -- --include-ignored --test-threads=4
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}\examples-target
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

