name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── L0: 编译工具本身 ─────────────────────────────────────────────
  build:
    name: Build (cpp2rust-demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

  # ── Lint: cargo fmt + cargo clippy ────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Check clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── 单元测试 ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib

      - name: Run unit tests (bin) – multi-feature merge & output-dir
        run: cargo test --bin cpp2rust-demo

  # ── 单元测试（Windows MinGW）────────────────────────────────────
  unit-tests-windows:
    name: Unit tests (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run unit tests (bin) – multi-feature merge & output-dir
        run: cargo test --bin cpp2rust-demo
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L1: Golden 测试（代码生成准确性）────────────────────────────
  l1-golden:
    name: L1 Golden tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- \
            --include-ignored \
            --test-threads=1

  # ── L1 Windows（MinGW）: 在 windows-latest 上验证代码生成准确性 ──
  l1-golden-windows:
    name: L1 Golden tests (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- `
            --include-ignored `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L1 Windows MSVC: 在 windows-latest 上验证代码生成准确性 ─────
  l1-golden-msvc:
    name: L1 Golden tests (Windows MSVC)
    runs-on: windows-latest
    needs: build-msvc
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- `
            --include-ignored `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L2: 编译测试（所有示例 rust_hicc/ 可 cargo build）───────────
  l2-compile:
    name: L2 Compile tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests

  # ── L2 Windows（MinGW）: 在 windows-latest 上验证所有示例可编译 ──
  l2-compile-windows:
    name: L2 Compile tests (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L3: 运行测试（cargo run 输出与 README 一致）────────────────
  l3-run:
    name: L3 Run tests
    runs-on: ubuntu-latest
    needs: [l1-golden, l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-cargo-l3-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-l3-
            ${{ runner.os }}-cargo-

      - name: Build C++ shared libraries for all examples
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ lib for $example..."
            (cd "$dir" && g++ -shared -fPIC *.cpp -o "lib${example##*_}.so") || echo "::warning::Failed to build C++ lib for $example (skipping)"
          done

      # 并行预构建所有示例项目：共享同一 CARGO_TARGET_DIR，hicc 只编译一次；
      # 测试时 cargo_run 直接执行已编译二进制，跳过 cargo 开销。
      - name: Pre-build all Rust example projects
        run: |
          # 串行预热：先构建一个示例，确保共享依赖（如 hicc-std 的 build 脚本/cc-rs）只编译一次，
          # 避免随后并行构建共享 CARGO_TARGET_DIR 时并发编译同一依赖导致的间歇性竞态失败。
          # 同时预热「不依赖 hicc-std」与「依赖 hicc-std」的代表示例各一个，
          # 确保 hicc / hicc-build / hicc-std 等共享 build 脚本（cc-rs）只在串行阶段编译一次。
          std_first=$(dirname "$(grep -l 'hicc-std' examples/*/rust_hicc/Cargo.toml | head -n1)" 2>/dev/null)
          for warm in "$(ls -d examples/*/rust_hicc | head -n1)" "$std_first"; do
            [ -n "$warm" ] && cargo build --manifest-path "$warm"/Cargo.toml
          done
          ls -d examples/*/rust_hicc | \
            xargs -P$(nproc) -I{} \
              cargo build --manifest-path {}/Cargo.toml
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

      - name: Run L3 run tests
        run: |
          cargo test --test l3_run_tests -- \
            --include-ignored \
            --test-threads=4
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

  # ── L3 Windows（MinGW）: 在 windows-latest 上验证示例运行输出 ───
  l3-run-windows:
    name: L3 Run tests (Windows MinGW)
    runs-on: windows-latest
    needs: [l2-compile-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-mingw-cargo-l3-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-mingw-cargo-l3-
            ${{ runner.os }}-mingw-cargo-

      - name: Build C++ DLLs for all examples
        shell: msys2 {0}
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ DLL for $example..."
            (cd "$dir" && g++ -shared *.cpp -o "${example##*_}.dll") || echo "::warning::Failed to build C++ DLL for $example (skipping)"
          done

      # 并行预构建所有示例项目（PowerShell），共享 CARGO_TARGET_DIR。
      # cargo 是 Windows 原生二进制，不在 MSYS2 PATH 中，因此不能使用 msys2 shell。
      - name: Pre-build all Rust example projects
        run: |
          $targetDir = "$env:GITHUB_WORKSPACE\examples-target"
          $libclangPath = "$env:LLVM_PATH\bin"
          $manifests = Get-ChildItem -Path examples -Recurse -Filter Cargo.toml |
            Where-Object { $_.DirectoryName -like '*rust_hicc' } |
            Select-Object -ExpandProperty FullName
          $jobs = $manifests | ForEach-Object {
            $manifestPath = $_
            Start-Job -ScriptBlock {
              param($manifest, $tdir, $llvm)
              $env:CARGO_TARGET_DIR = $tdir
              $env:LIBCLANG_PATH = $llvm
              $result = cargo build --manifest-path $manifest 2>&1
              if ($LASTEXITCODE -ne 0) {
                throw "cargo build failed for $manifest`n$result"
              }
            } -ArgumentList $manifestPath, $targetDir, $libclangPath
          }
          $jobs | Wait-Job | Receive-Job
          $failed = $jobs | Where-Object { $_.State -eq 'Failed' }
          if ($failed.Count -gt 0) {
            $failed | ForEach-Object { Receive-Job $_ -ErrorAction SilentlyContinue }
            throw "Pre-build failed for $($failed.Count) example project(s)"
          }
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}\examples-target
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run L3 run tests
        run: |
          cargo test --test l3_run_tests -- --include-ignored --test-threads=4
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}\examples-target
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L_smoke: 冒烟测试（migrated examples 的 cargo test smoke.rs）──
  l-smoke:
    name: L_smoke Smoke tests
    runs-on: ubuntu-latest
    needs: [l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-smoke-
            ${{ runner.os }}-cargo-

      # v7: 自动发现所有含 tests/smoke.rs 的示例，运行 cargo test --test smoke
      - name: Run smoke tests for all examples (48/48 coverage)
        run: |
          FAILED=()
          passed=0
          total=0
          for smoke_file in examples/*/rust_hicc/tests/smoke.rs; do
            example=$(basename $(dirname $(dirname $(dirname "$smoke_file"))))
            dir="examples/${example}/rust_hicc"
            total=$((total + 1))
            echo "=== Running smoke tests for ${example} ==="
            if cargo test --manifest-path "${dir}/Cargo.toml" \
                --target-dir "${{ github.workspace }}/examples-target" \
                --test smoke 2>&1; then
              echo "✅ ${example}: smoke tests passed"
              passed=$((passed + 1))
            else
              echo "❌ ${example}: smoke tests FAILED"
              FAILED+=("${example}")
            fi
          done
          echo ""
          echo "Smoke test summary: ${passed}/${total} passed"
          if [ ${#FAILED[@]} -ne 0 ]; then
            echo "Failed smoke tests: ${FAILED[*]}"
            exit 1
          fi

      # v7 门禁：确保代码库中不存在 CPP2RUST_GEN_* 环境变量引用
      - name: Gate check - no CPP2RUST_GEN_* references
        run: |
          matches=$(grep -r "CPP2RUST_GEN_" --include="*.rs" --include="*.toml" --include="*.yml" --include="*.md" src/ tests/ examples/ || true)
          if [ -n "$matches" ]; then
            echo "❌ Found CPP2RUST_GEN_* references (should be removed in v7):"
            echo "$matches"
            exit 1
          fi
          echo "✅ No CPP2RUST_GEN_* references found"

  # ── L6: gen-verify 端到端生成验证 ────────────────────────────────
  gen-verify:
    name: L6 gen-verify (工具实际生成代码可编译验证)
    runs-on: ubuntu-latest
    needs: [unit-tests, l1-golden]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gen-verify-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gen-verify-
            ${{ runner.os }}-cargo-

      # 运行 L6 gen-verify 集成测试（全部 48 个示例）
      # 标注 #[ignore] 需要 --include-ignored 显式触发
      - name: Run L6 gen-verify tests
        run: |
          cargo test --test gen_verify_e2e_test -- \
            --include-ignored \
            --test-threads=1

  # ── L6: gen-verify 端到端生成验证 (Windows MinGW) ─────────────────
  gen-verify-windows:
    name: L6 gen-verify (Windows MinGW)
    runs-on: windows-latest
    needs: [unit-tests-windows, l1-golden-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-gen-verify-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-mingw-cargo-gen-verify-
            ${{ runner.os }}-mingw-cargo-

      - name: Run L6 gen-verify tests
        run: |
          cargo test --test gen_verify_e2e_test -- `
            --include-ignored `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L6: gen-verify 端到端生成验证 (Windows MSVC) ─────────────────
  gen-verify-msvc:
    name: L6 gen-verify (Windows MSVC)
    runs-on: windows-latest
    needs: [unit-tests-msvc, l1-golden-msvc]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-gen-verify-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-msvc-cargo-gen-verify-
            ${{ runner.os }}-msvc-cargo-

      - name: Run L6 gen-verify tests
        run: |
          cargo test --test gen_verify_e2e_test -- `
            --include-ignored `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L6: gen-verify 端到端生成验证 (macOS) ────────────────────────
