        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      # 单线程运行：clang 全局状态竞争 + 项目内文件数量多
      - name: Run multi-feature & output-dir E2E tests
        run: |
          cargo test --test multi_feature_e2e_test -- \
            --test-threads=1

  # ── L4: 多 feature 合并 & output-dir 真实项目验证（macOS）────────
  l4-multi-feature-e2e-macos:
    name: L4 Multi-Feature & Output-Dir E2E (macOS)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run multi-feature & output-dir E2E tests
        run: |
          cargo test --test multi_feature_e2e_test -- \
            --test-threads=1

  # ── L4: 多 feature 合并 & output-dir 真实项目验证（Windows MinGW）
  l4-multi-feature-e2e-windows:
    name: L4 Multi-Feature & Output-Dir E2E (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Run multi-feature & output-dir E2E tests
        run: |
          cargo test --test multi_feature_e2e_test -- `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L4: 多 feature 合并 & output-dir 真实项目验证（Windows MSVC）
  l4-multi-feature-e2e-msvc:
    name: L4 Multi-Feature & Output-Dir E2E (Windows MSVC)
    runs-on: windows-latest
    needs: build-msvc
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-

      - name: Run multi-feature & output-dir E2E tests
        run: |
          cargo test --test multi_feature_e2e_test -- `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

