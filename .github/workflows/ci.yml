  # ── L2 Compile tests (macOS) ──────────────────────────────────────
  l2-compile-macos:
    name: L2 Compile tests (macOS)
    runs-on: macos-latest
    needs: build-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
