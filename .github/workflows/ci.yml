  # ── L5: nm 符号链接验证（C++ extern-C ⊆ Rust binary）───────────
  l5-nm-symbols:
    name: L5 nm symbol validation
    runs-on: ubuntu-latest
    needs: [l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev binutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-cargo-l5-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-l5-
            ${{ runner.os }}-cargo-

      # 并行预构建所有示例 Rust crate：共享 CARGO_TARGET_DIR，hicc 只编译一次；
      # 测试时每个 cargo_build_example 调用直接命中缓存，跳过 cargo 开销。
      - name: Pre-build all Rust example projects
        run: |
          # 串行预热：先构建一个示例，确保共享依赖（如 hicc-std 的 build 脚本/cc-rs）只编译一次，
          # 避免随后并行构建共享 CARGO_TARGET_DIR 时并发编译同一依赖导致的间歇性竞态失败。
          # 同时预热「不依赖 hicc-std」与「依赖 hicc-std」的代表示例各一个，
          # 确保 hicc / hicc-build / hicc-std 等共享 build 脚本（cc-rs）只在串行阶段编译一次。
          std_first=$(dirname "$(grep -l 'hicc-std' examples/*/rust_hicc/Cargo.toml | head -n1)" 2>/dev/null)
          for warm in "$(ls -d examples/*/rust_hicc | head -n1)" "$std_first"; do
            [ -n "$warm" ] && cargo build --manifest-path "$warm"/Cargo.toml
          done
          ls -d examples/*/rust_hicc | \
            xargs -P$(nproc) -I{} \
              cargo build --manifest-path {}/Cargo.toml
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

      # --nocapture：确保符号比对报告（C++ exports / Rust linked / missing）
      # 在 CI 日志中可见，无论测试成功与否均可追溯。
      - name: Run L5 nm symbol tests
        run: |
          cargo test --test l5_nm_symbol_tests -- \
            --ignored \
            --nocapture \
            --test-threads=4
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

