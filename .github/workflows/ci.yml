name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Check clippy
        run: cargo clippy --all-targets -- -D warnings

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib

      - name: Run unit tests (bin)
        run: cargo test --bin cpp2rust-demo

  l1-golden:
    name: L1 Golden tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- \
            --include-ignored \
            --test-threads=1

  l2-compile:
    name: L2 Compile tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests

  l-smoke:
    name: L_smoke Smoke tests
    runs-on: ubuntu-latest
    needs: [l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Init required submodules
        run: git submodule update --init references/rapidjson references/pugixml references/nlohmann-json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-cargo-smoke-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-smoke-
            ${{ runner.os }}-cargo-

      - name: Run smoke tests for all examples
        run: |
          FAILED=()
          passed=0
          total=0
          for smoke_file in examples/*/rust_hicc/tests/smoke.rs; do
            example=$(basename $(dirname $(dirname $(dirname "$smoke_file"))))
            dir="examples/${example}/rust_hicc"
            total=$((total + 1))
            echo "=== Running smoke tests for ${example} ==="
            if cargo test --manifest-path "${dir}/Cargo.toml" \
                --target-dir "${{ github.workspace }}/examples-target" \
                --test smoke 2>&1; then
              echo "${example}: smoke tests passed"
              passed=$((passed + 1))
            else
              echo "${example}: smoke tests FAILED"
              FAILED+=("${example}")
            fi
          done
          echo ""
          echo "Smoke test summary: ${passed}/${total} passed"
          if [ ${#FAILED[@]} -ne 0 ]; then
            echo "Failed smoke tests: ${FAILED[*]}"
            exit 1
          fi

      - name: Gate check - no CPP2RUST_GEN_* references
        run: |
          matches=$(grep -r "CPP2RUST_GEN_" --include="*.rs" --include="*.toml" --include="*.yml" --include="*.md" src/ tests/ examples/ || true)
          if [ -n "$matches" ]; then
            echo "Found CPP2RUST_GEN_* references:"
            echo "$matches"
            exit 1
          fi
          echo "No CPP2RUST_GEN_* references found"

  gen-verify:
    name: gen-verify
    runs-on: ubuntu-latest
    needs: [unit-tests, l1-golden]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gen-verify-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gen-verify-
            ${{ runner.os }}-cargo-

      - name: Run gen-verify tests
        run: |
          cargo test --test gen_verify_e2e_test -- \
            --include-ignored \
            --test-threads=1

  tinyxml2-e2e:
    name: tinyxml2 E2E
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init tinyxml2 submodule
        run: git submodule update --init references/tinyxml2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tinyxml2 E2E
        run: cargo test --test tinyxml2_e2e_test -- --test-threads=1

  l5-nm-symbols:
    name: L5 nm symbol validation
    runs-on: ubuntu-latest
    needs: [l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Init required submodules
        run: git submodule update --init references/rapidjson references/pugixml references/nlohmann-json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev binutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-cargo-l5-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-l5-
            ${{ runner.os }}-cargo-

      - name: Pre-build all Rust example projects
        run: |
          ls -d examples/*/rust_hicc | \
            xargs -P$(nproc) -I{} \
              cargo build --manifest-path {}/Cargo.toml
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

      - name: Run L5 nm symbol tests
        run: |
          cargo test --test l5_nm_symbol_tests -- \
            --ignored \
            --nocapture \
            --test-threads=4
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

  # Windows MinGW 系列 — 自动触发
  l1-golden-mingw:
    name: L1 Golden tests (MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-clang

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mingw-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: mingw-cargo-

      - name: Run L1 golden tests
        run: cargo test --test l1_golden_tests -- --include-ignored --test-threads=1

  l2-compile-mingw:
    name: L2 Compile tests (MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-clang

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mingw-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: mingw-cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests

  gen-verify-mingw:
    name: gen-verify (MinGW)
    runs-on: windows-latest
    needs: [unit-tests, l1-golden]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-toolchain mingw-w64-x86_64-clang

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}\bin" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mingw-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: mingw-cargo-

      - name: Run gen-verify tests
        run: cargo test --test gen_verify_e2e_test -- --include-ignored --test-threads=1

  # macOS — push/PR 自动触发 + workflow_dispatch 手动触发
  macos-ci:
    name: macOS CI (build + unit + L1)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

      - name: Run unit tests
        run: |
          cargo test --lib
          cargo test --bin cpp2rust-demo

      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- \
            --include-ignored \
            --test-threads=1

  # MSVC — push/PR 自动触发 + workflow_dispatch 手动触发
  build-msvc:
    name: Build (Windows MSVC)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-

      - name: Build
        run: cargo build --all-targets
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
