name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── L0: 编译工具本身 ─────────────────────────────────────────────
  build:
    name: Build (cpp2rust-demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

  # ── 单元测试 ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib

      - name: Run unit tests (bin) – multi-feature merge & output-dir
        run: cargo test --bin cpp2rust-demo

  # ── 单元测试（Windows MinGW）────────────────────────────────────
  unit-tests-windows:
    name: Unit tests (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run unit tests (bin) – multi-feature merge & output-dir
        run: cargo test --bin cpp2rust-demo
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L1: Golden 测试（代码生成准确性）────────────────────────────
  l1-golden:
    name: L1 Golden tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- \
            --include-ignored \
            --test-threads=1

  # ── L1 Windows（MinGW）: 在 windows-latest 上验证代码生成准确性 ──
  l1-golden-windows:
    name: L1 Golden tests (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- `
            --include-ignored `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L1 Windows MSVC: 在 windows-latest 上验证代码生成准确性 ─────
  l1-golden-msvc:
    name: L1 Golden tests (Windows MSVC)
    runs-on: windows-latest
    needs: build-msvc
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- `
            --include-ignored `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L2: 编译测试（所有示例 rust_hicc/ 可 cargo build）───────────
  l2-compile:
    name: L2 Compile tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests

  # ── L2 Windows（MinGW）: 在 windows-latest 上验证所有示例可编译 ──
  l2-compile-windows:
    name: L2 Compile tests (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L3: 运行测试（cargo run 输出与 README 一致）────────────────
  l3-run:
    name: L3 Run tests
    runs-on: ubuntu-latest
    needs: [l1-golden, l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build C++ shared libraries for all examples
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ lib for $example..."
            (cd "$dir" && g++ -shared -fPIC *.cpp -o "lib${example##*_}.so") || echo "⚠ Failed to build C++ lib for $example (skipping)"
          done

      - name: Run L3 run tests
        run: |
          cargo test --test l3_run_tests -- \
            --include-ignored \
            --test-threads=1

  # ── L3 Windows（MinGW）: 在 windows-latest 上验证示例运行输出 ───
  l3-run-windows:
    name: L3 Run tests (Windows MinGW)
    runs-on: windows-latest
    needs: [l2-compile-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Build C++ DLLs for all examples
        shell: msys2 {0}
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ DLL for $example..."
            (cd "$dir" && g++ -shared *.cpp -o "${example##*_}.dll") || echo "⚠ Failed to build C++ DLL for $example (skipping)"
          done

      - name: Run L3 run tests
        run: |
          cargo test --test l3_run_tests -- --include-ignored --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L4: rapidjson 端到端门禁（init + merge 全流程）──────────────
  l4-rapidjson-e2e:
    name: L4 rapidjson E2E
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev libgtest-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # 单线程运行：clang 全局状态 + rapidjson 文件数量多
      - name: Run L4 rapidjson E2E tests
        run: |
          cargo test --test rapidjson_e2e_test -- \
            --test-threads=1

  # ── L4 Windows（MinGW）: 在 windows-latest 上验证 E2E 捕获流程 ──
  l4-rapidjson-e2e-windows:
    name: L4 rapidjson E2E (Windows MinGW)
    runs-on: windows-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      # 单线程运行：clang 全局状态 + rapidjson 文件数量多
      - name: Run L4 rapidjson E2E tests
        run: |
          cargo test --test rapidjson_e2e_test -- `
            --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── Usage: verify-rapidjson-ffi.sh（本地验证脚本门禁）──────────
  usage-verify-rapidjson-ffi:
    name: Usage verify-rapidjson-ffi
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev \
            cmake binutils git

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build cpp2rust-demo binary
        run: cargo build --release

      - name: Run verify-rapidjson-ffi.sh
        run: |
          export PATH="${GITHUB_WORKSPACE}/target/release:${PATH}"
          SKIP_INSTALL=1 bash usage/verify-rapidjson-ffi.sh

  usage-verify-rapidjson-ffi-windows:
    name: Usage verify-rapidjson-ffi (Windows MinGW)
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-cmake
            git

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Build cpp2rust-demo binary (GNU ABI)
        run: cargo build --release
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run verify-rapidjson-ffi.sh in MSYS2 shell
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath -u "${CARGO_HOME:-$HOME/.cargo}")/bin:$(cygpath -u "${GITHUB_WORKSPACE}")/target/release:${PATH}"
          SKIP_INSTALL=1 bash usage/verify-rapidjson-ffi.sh
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  usage-verify-rapidjson-ffi-msvc:
    name: Usage verify-rapidjson-ffi (Windows MSVC)
    runs-on: windows-latest
    needs: build-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-cmake
            git

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-

      - name: Build cpp2rust-demo binary (MSVC ABI)
        run: cargo build --release
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run verify-rapidjson-ffi.sh in MSYS2 shell
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath -u "${CARGO_HOME:-$HOME/.cargo}")/bin:$(cygpath -u "${GITHUB_WORKSPACE}")/target/release:${PATH}"
          SKIP_INSTALL=1 bash usage/verify-rapidjson-ffi.sh
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── L5: nm 符号链接验证（C++ extern-C ⊆ Rust binary）───────────
  l5-nm-symbols:
    name: L5 nm symbol validation
    runs-on: ubuntu-latest
    needs: [l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev binutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # --nocapture：确保符号比对报告（C++ exports / Rust linked / missing）
      # 在 CI 日志中可见，无论测试成功与否均可追溯。
      - name: Run L5 nm symbol tests
        run: |
          cargo test --test l5_nm_symbol_tests -- \
            --ignored \
            --nocapture \
            --test-threads=4

  # ════════════════════════════════════════════════════════════════
  # Windows MSVC 系列（x86_64-pc-windows-msvc，无需 MSYS2）
  # windows-latest 已预装 VS Build Tools（cl.exe）；
  # 仅需 KyleMayes/install-llvm-action 提供 libclang + llvm-nm。
  # ════════════════════════════════════════════════════════════════

  # ── Build (MSVC) ─────────────────────────────────────────────────
  build-msvc:
    name: Build (cpp2rust-demo, Windows MSVC)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-

      - name: Build
        run: cargo build --all-targets
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

  # ── Unit tests (MSVC) ────────────────────────────────────────────
  unit-tests-msvc:
    name: Unit tests (Windows MSVC)
    runs-on: windows-latest
    needs: build-msvc
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (MSVC ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-msvc-cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run unit tests (bin) – multi-feature merge & output-dir
        run: cargo test --bin cpp2rust-demo
