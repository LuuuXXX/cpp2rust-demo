name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── L0: 编译工具本身 ─────────────────────────────────────────────
  build:
    name: Build (cpp2rust-demo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

  # ── 单元测试 ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests (lib)
        run: cargo test --lib

  # ── L1: Golden 测试（代码生成准确性）────────────────────────────
  l1-golden:
    name: L1 Golden tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        run: |
          cargo test --test l1_golden_tests -- \
            --include-ignored \
            --test-threads=1

  # ── L2: 编译测试（所有示例 rust_hicc/ 可 cargo build）───────────
  l2-compile:
    name: L2 Compile tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests

  # ── L3: 运行测试（cargo run 输出与 README 一致）────────────────
  l3-run:
    name: L3 Run tests
    runs-on: ubuntu-latest
    needs: [l1-golden, l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build C++ shared libraries for all examples
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ lib for $example..."
            (cd "$dir" && g++ -shared -fPIC *.cpp -o "lib${example##*_}.so") || echo "⚠ Failed to build C++ lib for $example (skipping)"
          done

      - name: Run L3 run tests
        run: |
          cargo test --test l3_run_tests -- \
            --include-ignored \
            --test-threads=1

  # ── L4: rapidjson 端到端门禁（init + merge 全流程）──────────────
  l4-rapidjson-e2e:
    name: L4 rapidjson E2E
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev libgtest-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # 单线程运行：clang 全局状态 + rapidjson 文件数量多
      - name: Run L4 rapidjson E2E tests
        run: |
          cargo test --test rapidjson_e2e_test -- \
            --test-threads=1

  # ── Usage: verify-rapidjson-ffi.sh（本地验证脚本门禁）──────────
  usage-verify-rapidjson-ffi:
    name: Usage verify-rapidjson-ffi
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev \
            cmake binutils git

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build cpp2rust-demo binary
        run: cargo build --release

      - name: Run verify-rapidjson-ffi.sh
        run: |
          export PATH="${GITHUB_WORKSPACE}/target/release:${PATH}"
          SKIP_INSTALL=1 bash usage/verify-rapidjson-ffi.sh

  # ── L5: nm 符号链接验证（C++ extern-C ⊆ Rust binary）───────────
  l5-nm-symbols:
    name: L5 nm symbol validation
    runs-on: ubuntu-latest
    needs: [l2-compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev binutils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # --nocapture：确保符号比对报告（C++ exports / Rust linked / missing）
      # 在 CI 日志中可见，无论测试成功与否均可追溯。
      - name: Run L5 nm symbol tests
        run: |
          cargo test --test l5_nm_symbol_tests -- \
            --ignored \
            --nocapture \
            --test-threads=4

  # ── Windows: 完整验证（构建 + 单元测试 + L1~L4）──────────────────
  # L5（nm 符号）和 Usage bash 脚本依赖 Unix 工具，仅在 Linux 运行。
  windows-build:
    name: Windows Full Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM/Clang (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"

      - name: Install Rust toolchain (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build (all targets)
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo build --all-targets

      - name: Run unit tests (lib)
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo test --lib

      - name: Run L0 Windows capture tests
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo test --test l0_windows_capture_test

      # L1 测试须单线程运行（clang 全局状态竞争）
      - name: Run L1 golden tests
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo test --test l1_golden_tests -- --include-ignored --test-threads=1

      - name: Run L2 compile tests
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo test --test l2_compile_tests

      - name: Run L3 run tests
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo test --test l3_run_tests -- --include-ignored --test-threads=1

      # 单线程运行：clang 全局状态 + rapidjson 文件数量多
      - name: Run L4 rapidjson E2E tests
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo test --test rapidjson_e2e_test -- --test-threads=1

