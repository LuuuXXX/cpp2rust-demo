      - name: Verify generated project passes cargo check
        run: |
          cd "${GITHUB_WORKSPACE}/.cpp2rust/rapidjson_shim/rust"
          cargo check --quiet

      - name: Verify generated project passes cargo test (smoke tests)
        # hicc import_lib! 在测试二进制链接时可能遇到 _hicc_export_methods_* 未定义限制；
