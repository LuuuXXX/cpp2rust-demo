name: ci

on:
  push:
  pull_request:

jobs:
  # -------------------------------------------------------
  # 格式检查：确保代码符合 rustfmt 规范
  # -------------------------------------------------------
  fmt:
    name: 格式检查 (rustfmt)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: 检查代码格式
        run: cargo fmt --check

  # -------------------------------------------------------
  # Clippy 静态分析：捕获常见 Rust 问题
  # -------------------------------------------------------
  clippy:
    name: Clippy 静态分析
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: 运行 Clippy
        run: cargo clippy -- -D warnings

  # -------------------------------------------------------
  # 构建与测试：全平台验证
  # -------------------------------------------------------
  test:
    name: 构建与测试
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: 构建
        run: cargo build --verbose
      - name: 运行测试
        run: cargo test --verbose

  # -------------------------------------------------------
  # 文档构建：确保文档注释无错误
  # -------------------------------------------------------
  doc:
    name: 文档构建
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: 构建文档
        run: cargo doc --no-deps --document-private-items
