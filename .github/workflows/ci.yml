      - name: Run L2 compile tests
        run: cargo test --test l2_compile_tests

  # ── L3 Run tests (macOS) ──────────────────────────────────────────
  l3-run-macos:
    name: L3 Run tests (macOS)
    runs-on: macos-latest
    needs: [l1-golden-macos, l2-compile-macos]
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=${{ env.LLVM_PATH }}/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples-target
          key: ${{ runner.os }}-cargo-l3-${{ hashFiles('**/Cargo.toml', 'examples/*/rust_hicc/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-l3-
            ${{ runner.os }}-cargo-

      - name: Build C++ shared libraries for all examples
        run: |
          for dir in examples/*/cpp; do
            example=$(basename $(dirname "$dir"))
            echo "Building C++ dylib for $example..."
            # 使用系统 Apple Clang，避免 LLVM clang++ 使用其自带头文件与 macOS SDK 不兼容
            (cd "$dir" && /usr/bin/clang++ -dynamiclib *.cpp -o "lib${example##*_}.dylib") || echo "::warning::Failed to build C++ dylib for $example (skipping)"
          done

      # 并行预构建所有示例项目，共享 CARGO_TARGET_DIR，hicc 只编译一次
      - name: Pre-build all Rust example projects
        run: |
          # 串行预热：先构建一个示例，确保共享依赖（如 hicc-std 的 build 脚本/cc-rs）只编译一次，
          # 避免随后并行构建共享 CARGO_TARGET_DIR 时并发编译同一依赖导致的间歇性竞态失败。
          # 不依赖 hicc-std 的代表示例（如 001）正常预热，预编译 hicc / hicc-build 等共享 build 脚本。
          first=$(ls -d examples/*/rust_hicc | head -n1)
          [ -n "$first" ] && cargo build --manifest-path "$first"/Cargo.toml
          # hicc-std 单次构建内含大量重模板翻译单元（如 std_vector.rs.cpp），macOS runner 内存有限，
          # cc-rs 并发编译多个此类 TU 会触发 OOM，编译进程被杀（exit 1、stderr 为空）致 L3/L5 失败。
          # 用 --jobs 1 串行编译 hicc-std，消除并发重 TU 的内存峰值；产物供后续并行阶段直接复用。
          std_first=$(dirname "$(grep -l 'hicc-std' examples/*/rust_hicc/Cargo.toml | head -n1)" 2>/dev/null)
          [ -n "$std_first" ] && cargo build --jobs 1 --manifest-path "$std_first"/Cargo.toml
          ls -d examples/*/rust_hicc | \
            xargs -P$(sysctl -n hw.logicalcpu) -I{} \
              cargo build --manifest-path {}/Cargo.toml
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

      - name: Run L3 run tests
        run: |
          cargo test --test l3_run_tests -- \
            --include-ignored \
            --test-threads=4
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/examples-target

