name: E2E sqlite3

# 实际项目独立 CI：sqlite3
on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "tests/sqlite3_e2e_test.rs"
      - ".github/workflows/e2e-sqlite3.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  sqlite3:
    name: sqlite3 init+merge+check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev libsqlite3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-sqlite3-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run sqlite3 E2E
        run: cargo test --test sqlite3_e2e_test -- --test-threads=1

  sqlite3-windows:
    name: sqlite3 init+merge+check (Windows MinGW)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-e2e-sqlite3-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Run sqlite3 E2E
        # Windows 无 /usr/include/sqlite3.h，测试内部会自动跳过（graceful skip）
        run: cargo test --test sqlite3_e2e_test -- --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
