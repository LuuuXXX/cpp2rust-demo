# Validate cpp2rust-demo against Tencent/rapidjson
#
# Purpose: This workflow validates that cpp2rust-demo (init + merge) works
#          correctly against a real-world C++ project (Tencent/rapidjson,
#          a widely-used header-only JSON library).  It runs on every
#          push and pull request to provide a clear pass/fail signal.
#
# The workflow mirrors scripts/validate-rapidjson.sh and can be reproduced
# locally by running that script.

name: validate-rapidjson

on:
  push:
  pull_request:

jobs:
  validate:
    name: Run cpp2rust-demo against rapidjson
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Check out cpp2rust-demo
      # ------------------------------------------------------------------
      - name: Checkout cpp2rust-demo
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. System dependencies (gcc, clang, make)
      # ------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc g++ clang make

      # ------------------------------------------------------------------
      # 3. Rust toolchain
      # ------------------------------------------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # ------------------------------------------------------------------
      # 4. Cache Cargo registry + build artifacts
      # ------------------------------------------------------------------
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ------------------------------------------------------------------
      # 5. Run script-driven rapidjson validation (local/CI single source)
      # ------------------------------------------------------------------
      - name: Run rapidjson validation script
        run: bash "$GITHUB_WORKSPACE/scripts/validate-rapidjson.sh" --release

      # ------------------------------------------------------------------
      # 6. Upload the entire .cpp2rust/ tree as a build artifact
      # ------------------------------------------------------------------
      - name: Upload .cpp2rust artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapidjson-cpp2rust-output
          path: /tmp/rapidjson/.cpp2rust/
          if-no-files-found: warn
