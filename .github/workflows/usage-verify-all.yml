name: Usage verify-all (本地验证脚本套件)

# 跑 usage/verify-<lib>-ffi.sh 系列（与 ci.yml 中的 usage-verify-rapidjson-ffi job 互补）。
# 与 e2e-<lib>.yml 区别：
#   - e2e-<lib>.yml 跑的是 Rust 集成测试（cargo test --test <lib>_e2e_test）
#   - 本 workflow 跑的是用户视角的 Shell 脚本（bash usage/verify-<lib>-ffi.sh）
# 两者互补：前者是工具内部 API 回归，后者是 CLI 流程端到端验证。
on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "hook/**"
      - "usage/**"
      - ".github/workflows/usage-verify-all.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ════════════════════════════════════════════════════════════════
  # Linux：逐库 verify job（矩阵）
  # ════════════════════════════════════════════════════════════════
  verify-linux:
    name: verify-${{ matrix.lib }} (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # sqlite3 走系统头 libsqlite3-dev，无 git submodule
        lib: [tinyxml2, pugixml, nlohmann-json, fmtlib, magic_enum, tomlplusplus, sqlite3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodules (除 sqlite3)
        if: matrix.lib != 'sqlite3'
        run: |
          case "${{ matrix.lib }}" in
            nlohmann-json) git submodule update --init references/nlohmann-json ;;
            magic_enum)    git submodule update --init references/magic_enum ;;
            *)             git submodule update --init references/${{ matrix.lib }} ;;
          esac

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev binutils \
            libsqlite3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-usage-verify-${{ matrix.lib }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-usage-verify-${{ matrix.lib }}-
            ${{ runner.os }}-cargo-

      - name: Build cpp2rust-demo binary
        run: cargo build --release

      - name: Run verify-${{ matrix.lib }}-ffi.sh
        # SKIP_INSTALL=1：用本地 target/release 的 cpp2rust-demo，跳过 cargo install。
        # 注意：cargo check / test 失败时脚本退出码为 1（已知 cpp2rust-demo 对该库的
        # 支持限制），不阻塞 workflow 但会显式暴露。若需严格 0 退出码，仅当 cargo
        # check / test 全通过时才算成功。
        run: |
          export PATH="${GITHUB_WORKSPACE}/target/release:${PATH}"
          bash usage/verify-${{ matrix.lib }}-ffi.sh
        continue-on-error: true

      - name: Verify exit code interpretation
        # 摘要输出：把脚本日志的关键行（PASS/FAIL/退出码）打到 step summary
        if: always()
        run: |
          log="/tmp/cpp2rust-verify-${{ matrix.lib }}.log"
          if [ -f "$log" ]; then
            echo "### ${{ matrix.lib }} 日志摘要（最后 30 行）" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 30 "$log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════
  # Linux：聚合入口（依赖所有 verify-linux 完成）
  # ════════════════════════════════════════════════════════════════
  verify-aggregator-linux:
    name: verify-all-ffi.sh (Linux aggregator)
    runs-on: ubuntu-latest
    needs: verify-linux
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init all E2E submodules
        run: |
          git submodule update --init \
            references/tinyxml2 \
            references/pugixml \
            references/nlohmann-json \
            references/fmtlib \
            references/magic_enum \
            references/tomlplusplus

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev binutils \
            libsqlite3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-usage-verify-all-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-usage-verify-all-
            ${{ runner.os }}-cargo-

      - name: Build cpp2rust-demo binary
        run: cargo build --release

      - name: Run verify-all-ffi.sh (聚合)
        # 注意：聚合脚本独立运行 8 个库，cargo check/test 失败被设计为脚本退出 1。
        # 此处 continue-on-error: true 表明当前 cpp2rust-demo 对部分库的支持有限，
        # 不作为合并阻塞；输出汇总矩阵到 step summary 便于追踪。
        run: |
          export PATH="${GITHUB_WORKSPACE}/target/release:${PATH}"
          bash usage/verify-all-ffi.sh
        continue-on-error: true

      - name: Aggregate summary to step summary
        if: always()
        run: |
          # 收集所有库日志的关键摘要
          echo "### verify-all 聚合结果（Linux）" >> $GITHUB_STEP_SUMMARY
          for lib in rapidjson tinyxml2 pugixml nlohmann-json fmtlib magic_enum tomlplusplus sqlite3; do
            log="/tmp/cpp2rust-verify-${lib}.log"
            if [ -f "$log" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "#### ${lib}" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -n 15 "$log" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ════════════════════════════════════════════════════════════════
  # Windows MinGW：选 3 个代表性库（覆盖 extern-C / OOP / header-only）
  # ════════════════════════════════════════════════════════════════
  verify-windows:
    name: verify-${{ matrix.lib }} (Windows MinGW)
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        lib: [tinyxml2, nlohmann-json, fmtlib]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodule
        run: |
          $lib = "${{ matrix.lib }}"
          if ($lib -eq "nlohmann-json") {
            git submodule update --init references/nlohmann-json
          } else {
            git submodule update --init "references/$lib"
          }

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils
            git

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-usage-verify-${{ matrix.lib }}-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-mingw-cargo-usage-verify-${{ matrix.lib }}-
            ${{ runner.os }}-mingw-cargo-

      - name: Build cpp2rust-demo binary (GNU ABI)
        run: cargo build --release
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin

      - name: Run verify-${{ matrix.lib }}-ffi.sh in MSYS2 shell
        # 在 MSYS2 bash 中运行，PATH 含本地 target/release 和 ~/.cargo/bin
        shell: msys2 {0}
        run: |
          export PATH="$(cygpath -u "${CARGO_HOME:-$HOME/.cargo}")/bin:$(cygpath -u "${GITHUB_WORKSPACE}")/target/release:${PATH}"
          bash usage/verify-${{ matrix.lib }}-ffi.sh
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        continue-on-error: true
