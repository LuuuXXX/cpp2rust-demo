name: E2E tinyxml2

# 实际项目独立 CI：tinyxml2
on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "tests/tinyxml2_e2e_test.rs"
      - ".github/workflows/e2e-tinyxml2.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  tinyxml2:
    name: tinyxml2 init+merge+check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodule
        run: git submodule update --init references/tinyxml2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang libclang-dev g++ libstdc++-14-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-tinyxml2-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tinyxml2 E2E
        run: cargo test --test tinyxml2_e2e_test -- --test-threads=1

  tinyxml2-windows:
    name: tinyxml2 init+merge+check (Windows MinGW)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init submodule
        run: git submodule update --init references/tinyxml2

      - name: Setup MSYS2 with MinGW-w64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-binutils

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install LLVM (for libclang)
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      - name: Install Rust toolchain (GNU ABI)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-mingw-cargo-e2e-tinyxml2-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-mingw-cargo-

      - name: Run tinyxml2 E2E
        run: cargo test --test tinyxml2_e2e_test -- --test-threads=1
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
