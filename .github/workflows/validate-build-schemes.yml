name: validate-build-schemes

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate ${{ matrix.project }} via ${{ matrix.build_system }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: rapidjson
            build_system: cmake
            repo_url: https://github.com/Tencent/rapidjson.git
            repo_dir: /tmp/rapidjson
            source_file: document.cpp
            include_stmt: '#include "rapidjson/document.h"'
            build_command: cmake -S . -B build && cmake --build build -j2
            expected_link_name: rapidjson
            expected_ffi: ffi_document.rs
          - project: spdlog
            build_system: make
            repo_url: https://github.com/gabime/spdlog.git
            repo_dir: /tmp/spdlog
            source_file: main.cpp
            include_stmt: '#include "spdlog/spdlog.h"'
            build_command: make -j2
            expected_link_name: spdlog
            expected_ffi: ffi_main.rs

    steps:
      - name: Checkout cpp2rust-demo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc g++ clang make cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build cpp2rust-demo
        run: cargo build --release

      - name: Clone test project
        run: git clone --depth=1 "${{ matrix.repo_url }}" "${{ matrix.repo_dir }}"

      - name: Prepare translation unit
        working-directory: ${{ matrix.repo_dir }}
        run: |
          cat > "${{ matrix.source_file }}" <<'CPP'
          ${{ matrix.include_stmt }}
          int main() { return 0; }
          CPP

      - name: Prepare CMake build files
        if: matrix.build_system == 'cmake'
        working-directory: ${{ matrix.repo_dir }}
        run: |
          cat > CMakeLists.txt <<'CMAKE'
          cmake_minimum_required(VERSION 3.10)
          project(cpp2rust_validate LANGUAGES CXX)
          add_executable(cpp2rust_entry ${{ matrix.source_file }})
          target_include_directories(cpp2rust_entry PRIVATE include)
          target_compile_features(cpp2rust_entry PRIVATE cxx_std_11)
          CMAKE

      - name: Prepare Make build files
        if: matrix.build_system == 'make'
        working-directory: ${{ matrix.repo_dir }}
        run: |
          cat > Makefile <<'MAKE'
          CXX ?= clang++
          CXXFLAGS ?= -std=c++17 -Iinclude
          all: cpp2rust_entry

          cpp2rust_entry: ${{ matrix.source_file }}
          	$(CXX) $(CXXFLAGS) -fsyntax-only ${{ matrix.source_file }}
          MAKE

      - name: Run cpp2rust-demo init
        working-directory: ${{ matrix.repo_dir }}
        run: |
          $GITHUB_WORKSPACE/target/release/cpp2rust-demo init \
            --link "${{ matrix.expected_link_name }}" \
            -- sh -c "${{ matrix.build_command }}"

      - name: Run cpp2rust-demo merge
        working-directory: ${{ matrix.repo_dir }}
        run: $GITHUB_WORKSPACE/target/release/cpp2rust-demo merge

      - name: Validate outputs
        working-directory: ${{ matrix.repo_dir }}
        run: |
          set -euo pipefail
          OUT=".cpp2rust/default"

          test -f "${OUT}/meta/build_cmd.txt"
          test -f "${OUT}/meta/selected_files.json"
          test -f "${OUT}/meta/headers.json"
          test -f "${OUT}/meta/init-interface-report.md"
          test -f "${OUT}/meta/merge-report.md"
          test -f "${OUT}/cpp/${{ matrix.source_file }}.cpp2rust"
          test -f "${OUT}/rust/src/${{ matrix.expected_ffi }}"
          test -f "${OUT}/rust/src/merged_ffi.rs"

          grep -q "${{ matrix.source_file }}.cpp2rust" "${OUT}/meta/selected_files.json"
          grep -q 'import_lib!' "${OUT}/rust/src/${{ matrix.expected_ffi }}"
          grep -q "link_name = \"${{ matrix.expected_link_name }}\"" "${OUT}/rust/src/${{ matrix.expected_ffi }}"

      - name: Upload .cpp2rust artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-${{ matrix.build_system }}-cpp2rust-output
          path: ${{ matrix.repo_dir }}/.cpp2rust/
          if-no-files-found: warn
