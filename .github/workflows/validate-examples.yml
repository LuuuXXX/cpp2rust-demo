# Validate cpp2rust-demo against the self-contained examples in examples/
#
# Purpose: Run every example through the full init → merge pipeline and
#          verify that the expected Rust FFI output is generated.  The
#          examples cover all feature categories from docs/特性支持全景图.md:
#
#   ✅ fully automatic  → simple/, class/, rapidjson/01-06, rapidjson/08
#   🔧 guided           → rapidjson/07, guided/01-03
#   ⚙️ semi-auto        → semi-auto/01-02
#   ⚠️ conditional      → conditional/01-02
#
# CI mirrors scripts/validate-examples.sh; reproduce locally with:
#   bash scripts/validate-examples.sh --release

name: validate-examples

on:
  push:
  pull_request:

jobs:
  validate:
    name: Run examples end-to-end
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Check out the repository
      # ------------------------------------------------------------------
      - name: Checkout cpp2rust-demo
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. System dependencies (clang for AST extraction)
      # ------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang

      # ------------------------------------------------------------------
      # 3. Rust toolchain
      # ------------------------------------------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # ------------------------------------------------------------------
      # 4. Cache Cargo registry + build artifacts
      # ------------------------------------------------------------------
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ------------------------------------------------------------------
      # 5. Run the unified examples validation script
      # ------------------------------------------------------------------
      - name: Run examples validation script
        run: bash "$GITHUB_WORKSPACE/scripts/validate-examples.sh" --release

      # ------------------------------------------------------------------
      # 6. Upload all generated .cpp2rust output as a build artifact
      # ------------------------------------------------------------------
      - name: Upload .cpp2rust artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-cpp2rust-output
          path: .cpp2rust/
          if-no-files-found: warn
